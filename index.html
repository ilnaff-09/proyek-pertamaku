<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Fisika - Ilnaff</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">⚡ Ilnaff.Dev</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Hai, Saya <span>Ilnaff</span></h1>
        <p>Mahasiswa Pendidikan Fisika | Belajar Full Stack Development</p>
    </section>

    <!-- CARD UTAMA -->
    <div class="container">
        <div class="card">
            <h2>⚡ Hukum Newton ke-2</h2>
            <p>Gaya = Massa × Percepatan</p>
            <div class="rumus-box">F = m × a</div>
            <br>
            <button class="btn" onclick="hitungGaya()">Hitung Gaya (10kg, 2m/s²)</button>
            <p id="hasil"></p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        &copy; 2026 Ilnaff. Built with ❤️ and JavaScript.
    </footer>

    <script>
        function hitungGaya() {
            const massa = 10;
            const percepatan = 2;
            const gaya = massa * percepatan;
            document.getElementById("hasil").innerHTML = "💪 Gaya = " + gaya + " Newton";
        }
    </script>

</body>
</html>
